name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WinAPX.Cli/WinAPX.Cli.csproj

      - name: Build CLI
        run: dotnet build src/WinAPX.Cli/WinAPX.Cli.csproj -c Release --no-restore

      - name: Build GUI
        run: dotnet build src/WinAPX.Gui/WinAPX.Gui.csproj -c Release